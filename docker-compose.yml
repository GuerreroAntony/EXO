version: "3.8"

services:
  openclaw-callcenter-demo:
    image: openclaw/openclaw:latest
    container_name: openclaw-callcenter-demo
    restart: unless-stopped
    ports:
      - "18800:3001"
      - "3334:3334"
    mem_limit: 3g
    cpus: 1.5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:size=256m
    volumes:
      - ./clients/callcenter-demo/data:/app/data
    env_file:
      - ./clients/callcenter-demo/.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
